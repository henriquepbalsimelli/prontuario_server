name: Rotate Encryption Reencrypt

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without persisting updates"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      batch_size:
        description: "Batch size"
        required: true
        default: "500"
        type: string
  schedule:
    - cron: "0 4 * * 1"

jobs:
  reencrypt:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: production
      SECRET_PROVIDER: env
      REQUIRE_MANAGED_SECRETS_IN_DEPLOY: "false"
      REQUIRE_ENCRYPTION_KEY_IN_DEPLOY: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      ENCRYPTION_KEYS_JSON: ${{ secrets.ENCRYPTION_KEYS_JSON }}
      ENCRYPTION_ACTIVE_KEY_VERSION: ${{ secrets.ENCRYPTION_ACTIVE_KEY_VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run re-encryption job (scheduled dry-run)
        if: github.event_name == 'schedule'
        run: python scripts/reencrypt_fields.py --dry-run --batch-size 500

      - name: Run re-encryption job (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/reencrypt_fields.py --dry-run --batch-size "${{ github.event.inputs.batch_size }}"
          else
            python scripts/reencrypt_fields.py --batch-size "${{ github.event.inputs.batch_size }}"
          fi
