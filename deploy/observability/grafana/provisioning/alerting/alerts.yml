apiVersion: 1

groups:
  - orgId: 1
    name: prontuario-api-alerts
    folder: Prontuario
    interval: 1m
    rules:
      - uid: api_5xx_rate_high
        title: API 5xx Rate High
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mimir
            model:
              datasource:
                type: prometheus
                uid: mimir
              editorMode: code
              expr: "sum(rate(http_server_duration_count{job=\"prontuario-api\",http_status_code=~\"5..\"}[5m])) / clamp_min(sum(rate(http_server_duration_count{job=\"prontuario-api\"}[5m])), 1)"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0.02]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Taxa de erro 5xx acima de 2% por 5m.

      - uid: api_latency_p95_high
        title: API Latency p95 High
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              datasource:
                type: prometheus
                uid: mimir
              editorMode: code
              expr: "histogram_quantile(0.95, sum(rate(http_server_duration_bucket{job=\"prontuario-api\"}[5m])) by (le))"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0.5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: p95 acima de 500ms por 10m.

      - uid: alloy_ingest_down
        title: Alloy Ingestion Unavailable
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mimir
            model:
              datasource:
                type: prometheus
                uid: mimir
              editorMode: code
              expr: "max(target_info{job=\"prontuario-api\"})"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              refId: C
        noDataState: Alerting
        execErrState: Error
        for: 5m
        annotations:
          summary: Alloy indisponível por 5m.

      - uid: lgtm_disk_high
        title: LGTM Disk Usage High
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              datasource:
                type: prometheus
                uid: mimir
              editorMode: code
              expr: "(1 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"}))"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0.85]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: Uso de disco do servidor LGTM acima de 85% por 10m.
