multitenancy_enabled: false

server:
  http_listen_port: 9009

memberlist:
  join_members:
    - mimir

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks
  tsdb:
    dir: /data/tsdb
  bucket_store:
    sync_dir: /data/tsdb-sync

compactor:
  data_dir: /data/compactor
  sharding_ring:
    kvstore:
      store: memberlist
  compaction_interval: 15m

distributor:
  ring:
    kvstore:
      store: memberlist

ingester:
  ring:
    kvstore:
      store: memberlist
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1
    kvstore:
      store: memberlist

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/rules

limits:
  max_label_names_per_series: 30
  max_label_name_length: 1024
  max_label_value_length: 2048
  ingestion_rate: 100000
  ingestion_burst_size: 200000
  compactor_blocks_retention_period: 30d
